name: Broken link check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # --root-dir resolves root-relative hrefs (e.g. /foundations/...) against
          # the built output. Must be an absolute path — ${{ github.workspace }}
          # expands before the step runs. Glob must be unquoted for bash to expand it.
          args: >
            --root-dir ${{ github.workspace }}/dist/client
            --exclude "^mailto:"
            --exclude "cloudflareinsights\\.com"
            --exclude "fonts\\.googleapis\\.com"
            --exclude "\\.pdf$"
            --timeout 20
            --max-retries 3
            --accept 200,206,429
            --no-progress
            ./dist/client/**/*.html
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
